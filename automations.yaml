- alias: Garage Stairs Lighting on Motion
  trigger:
  - platform: state
    entity_id: input_boolean.motion_garage_stairs
    to: 'on'
  condition:
    condition: state
    entity_id: light.garage_stairs
    state: 'off'
  action:
  - action: script.turn_on
    target:
      entity_id:
      - script.lighting_garage_stairs
  - service: input_boolean.turn_on
    entity_id: input_boolean.motion_trigger_garage_stairs_lights
  id: a1d2c56afe9f4b5cbf711da41ee20129
- alias: Garage Stairs Lighting on Door Open
  trigger:
  - platform: state
    entity_id: binary_sensor.garage_door
    to: 'on'
  condition:
    condition: state
    entity_id: light.garage_stairs
    state: 'off'
  action:
  - choose:
    - conditions:
      - condition: numeric_state
        entity_id: sensor.downstairs_hallway_trisensor_luminance
        below: 20.0
      sequence:
      - action: script.turn_on
        target:
          entity_id:
          - script.lighting_garage_stairs
          - script.lighting_downstairs_hallway
    default:
    - action: script.turn_on
      target:
        entity_id:
        - script.lighting_garage_stairs
  - service: input_boolean.turn_on
    entity_id: input_boolean.door_trigger_garage_stairs_lights
  - condition: numeric_state
    entity_id: sensor.downstairs_hallway_trisensor_luminance
    below: 20.0
  - service: input_boolean.turn_on
    entity_id: input_boolean.door_trigger_downstairs_hallway_lights
  id: 1463409aeb2448048080084c7a65a7c2
- alias: Garage Stairs Lighting Door to Motion Transition
  trigger:
    platform: state
    entity_id: input_boolean.motion_garage_stairs
    to: 'on'
  condition:
    condition: state
    entity_id: input_boolean.door_trigger_garage_stairs_lights
    state: 'on'
  action:
  - service: input_boolean.turn_on
    entity_id: input_boolean.motion_trigger_garage_stairs_lights
  - service: input_boolean.turn_off
    entity_id: input_boolean.door_trigger_garage_stairs_lights
  id: 1b00ddc5de20400eac0502be8ae48ff2
- alias: Garage Stairs Lighting Timed Out
  trigger:
  - platform: state
    entity_id: input_boolean.motion_garage_stairs
    to: 'off'
    for:
      seconds: 20
  - platform: state
    entity_id: binary_sensor.garage_door
    to: 'off'
    for:
      seconds: 140
  condition:
    condition: and
    conditions:
    - condition: state
      entity_id: input_boolean.motion_garage_stairs
      state: 'off'
    - condition: state
      entity_id: binary_sensor.garage_door
      state: 'off'
      for:
        minutes: 2
    - condition: or
      conditions:
      - condition: state
        entity_id: input_boolean.motion_trigger_garage_stairs_lights
        state: 'on'
      - condition: state
        entity_id: input_boolean.door_trigger_garage_stairs_lights
        state: 'on'
  action:
  - service: light.turn_off
    entity_id: light.garage_stairs
  - service: input_boolean.turn_off
    entity_id:
    - input_boolean.motion_trigger_garage_stairs_lights
    - input_boolean.door_trigger_garage_stairs_lights
  id: eb61782de265430187fad99500311ae9
