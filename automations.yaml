  alias: Sonos - Paused Reset
  triggers:
  - entity_id: sensor.sonos_group_master_state
    from: playing
    to: paused
    for:
      minutes: 30
    trigger: state
  actions:
  - data:
      entity_id: media_player.sonos_kitchen
      volume_level: '{{ (states("input_number.sonos_kitchen_volume") | float - offset)
        | round(2, "floor") }}'
    action: media_player.volume_set
  - data:
      entity_id: media_player.sonos_living_room
      volume_level: '{{ (states("input_number.sonos_living_room_volume") | float -
        offset) | round(2, "floor") }}'
    action: media_player.volume_set
  - data:
      entity_id: media_player.sonos_rec_room
      volume_level: '{{ (states("input_number.sonos_rec_room_volume") | float - offset)
        | round(2, "floor") }}'
    action: media_player.volume_set
  - data:
      entity_id: media_player.sonos_bedroom
      volume_level: '{{ (states("input_number.sonos_bedroom_volume") | float - offset)
        | round(2, "floor") }}'
    action: media_player.volume_set
  - data:
      entity_id: media_player.sonos_bathroom
      volume_level: '{{ (states("input_number.sonos_bathroom_volume") | float - offset)
        | round(2, "floor") }}'
    action: media_player.volume_set
  - data:
      entity_id: media_player.sonos_den
      volume_level: '{{ states("input_number.sonos_den_volume") | float }}'
    action: media_player.volume_set
  - data:
      entity_id: media_player.sonos_move
      volume_level: '{{ states("input_number.sonos_move_volume") | float }}'
    action: media_player.volume_set
  - data:
      entity_id: media_player.sonos_bedroom
      group_members:
      - media_player.sonos_bathroom
      - media_player.sonos_den
      - media_player.sonos_kitchen
      - media_player.sonos_living_room
      - media_player.sonos_rec_room
      - media_player.sonos_move
    action: media_player.join
  variables:
    offset: 0.02
