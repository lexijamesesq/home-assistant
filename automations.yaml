- alias: Browser Mod Turn Screen Off - Night
  trigger:
  - platform: event
    event_type: mode_sleep_on_delay_short
  - platform: template
    value_template: '{{ is_state("input_boolean.mode_sleep", "on") and as_timestamp(states("sensor.date")
      + " " + states("sensor.time")) > (as_timestamp(states.input_boolean.mode_sleep.last_changed)
      + (60 * 5)) and is_state_attr("sensor.bedroom_hallway_dashboard", "screenOn",
      true) }}'
    for:
      minutes: 2
  - platform: template
    value_template: '{{ is_state("input_boolean.mode_sleep", "on") and as_timestamp(states("sensor.date")
      + " " + states("sensor.time")) > (as_timestamp(states.input_boolean.mode_sleep.last_changed)
      + (60 * 5)) and is_state_attr("sensor.downstairs_hallway_dashboard", "screenOn",
      true) }}'
    for:
      minutes: 2
  - platform: template
    value_template: '{{ is_state("input_boolean.mode_sleep", "on") and as_timestamp(states("sensor.date")
      + " " + states("sensor.time")) > (as_timestamp(states.input_boolean.mode_sleep.last_changed)
      + (60 * 5)) and is_state_attr("sensor.garage_entrance_dashboard", "screenOn",
      true) }}'
    for:
      minutes: 2
  action:
  - service: rest_command.bedroom_hallway_dashboard_sleep
  - service: rest_command.downstairs_hallway_dashboard_sleep
  - service: rest_command.garage_entrance_dashboard_sleep
