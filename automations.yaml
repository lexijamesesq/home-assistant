- alias: Mode - Update Current Mode
  trigger:
  - platform: event
    event_type: mode_reset_after_ha_start
  - platform: time
    at: input_datetime.night_ends
  - platform: time
    at: input_datetime.sunrise_ends
  - platform: time
    at: input_datetime.sunset_starts
  - platform: time
    at: input_datetime.sunset_ends
  mode: restart
  action:
  - service: input_boolean.turn_off
    entity_id:
    - input_boolean.mode_morning
    - input_boolean.mode_day
    - input_boolean.mode_sunset
    - input_boolean.mode_night
  - choose:
    - conditions:
      - condition: time
        after: input_datetime.night_ends
        before: input_datetime.sunrise_ends
      sequence:
      - service: input_boolean.turn_on
        entity_id: input_boolean.mode_morning
    - conditions:
      - condition: time
        after: input_datetime.sunrise_ends
        before: input_datetime.sunset_starts
      sequence:
      - service: input_boolean.turn_on
        entity_id: input_boolean.mode_day
    - conditions:
      - condition: time
        after: input_datetime.sunset_starts
        before: input_datetime.sunset_ends
      sequence:
      - service: input_boolean.turn_on
        entity_id: input_boolean.mode_sunset
    - conditions:
      - condition: time
        after: input_datetime.sunset_ends
        before: input_datetime.night_ends
      sequence:
      - service: input_boolean.turn_on
        entity_id: input_boolean.mode_night
    default:
    - service: notify.mobile_app_alexis_iphone
      data:
        title: Home Assistant
        message: Unable to update current mode. No conditions matched.
        data:
          push:
            thread-id: ha-condo-group
            sound: gentle-alarm.wav
