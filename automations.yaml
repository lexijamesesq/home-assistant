- id: '1735600259809'
  alias: Studio Dimmer Lights Sync
  triggers:
  - id: brightness
    entity_id:
    - light.studio
    - light.studio_dimmer
    attribute: brightness
    trigger: state
  - id: 'off'
    entity_id:
    - light.studio
    - light.studio_dimmer
    to: 'off'
    trigger: state
  actions:
  - wait_template: '{{ is_state(''script.lighting_studio'', ''off'') }}'
    timeout: 00:00:10
    continue_on_timeout: false
  - choose:
    - conditions:
      - condition: trigger
        id: brightness
      sequence:
      - delay: 00:00:01
      - parallel:
        - entity_id: light.studio
          data:
            brightness: '{{ state_attr(trigger.entity_id, ''brightness'') | int(0)
              }}'
          action: light.turn_on
        - data:
            brightness: '{{ state_attr(trigger.entity_id, ''brightness'') | int(0)
              }}'
          entity_id: light.studio_dimmer
          action: light.turn_on
    - conditions:
      - condition: trigger
        id: 'off'
      sequence:
      - entity_id:
        - light.studio
        - light.studio_dimmer
        action: light.turn_off
  mode: restart
