- alias: Mode - Manually Reset After HA Start
  trigger:
  - platform: homeassistant
    event: start
  condition:
  - condition: or
    conditions:
    - condition: and
      conditions:
      - condition: state
        entity_id: input_boolean.mode_morning
        state: 'off'
      - condition: time
        after: input_datetime.night_ends
        before: input_datetime.sunrise_ends
    - condition: and
      conditions:
      - condition: state
        entity_id: input_boolean.mode_day
        state: 'off'
      - condition: time
        after: input_datetime.sunrise_ends
        before: input_datetime.sunset_starts
    - condition: and
      conditions:
      - condition: state
        entity_id: input_boolean.mode_sunset
        state: 'off'
      - condition: time
        after: input_datetime.sunset_starts
        before: input_datetime.sunset_ends
    - condition: and
      conditions:
      - condition: state
        entity_id: input_boolean.mode_night
        state: 'off'
      - condition: time
        after: input_datetime.sunset_ends
        before: input_datetime.night_ends
  action:
  - event: mode_reset_after_ha_start
  id: 208e6f9c413b4ef9b9ee5a7c50fa6bb0
- alias: Manually Reset Energy Off-Peak Tariff
  trigger:
  - platform: homeassistant
    event: start
  condition:
    condition: and
    conditions:
    - condition: state
      entity_id: select.grid_consumption_hourly
      state: peak
    - condition: or
      conditions:
      - condition: state
        entity_id: binary_sensor.srp_on_peak_day
        state: 'off'
      - '{{ as_timestamp(now()) | timestamp_custom("%H:%M", default = 0) < "16:00"
        }}'
      - '{{ as_timestamp(now()) | timestamp_custom("%H:%M", default = 0) >= "19:00"
        }}'
  action:
  - service: select.select_option
    target:
      entity_id:
      - select.grid_consumption_daily
      - select.grid_consumption_hourly
      - select.grid_consumption_monthly
    data:
      option: offpeak
  id: e423e6b54614475598734e44bad2d2f5
- alias: Manually Reset Energy Peak Tariff
  trigger:
  - platform: homeassistant
    event: start
  condition:
    condition: and
    conditions:
    - condition: state
      entity_id: select.grid_consumption_hourly
      state: offpeak
    - condition: state
      entity_id: binary_sensor.srp_on_peak_day
      state: 'on'
    - '{{ as_timestamp(now()) | timestamp_custom("%H:%M", default = 0) >= "16:00"
      }}'
    - '{{ as_timestamp(now()) | timestamp_custom("%H:%M", default = 0) < "19:00" }}'
  action:
  - service: select.select_option
    target:
      entity_id:
      - select.grid_consumption_daily
      - select.grid_consumption_hourly
      - select.grid_consumption_monthly
    data:
      option: peak
