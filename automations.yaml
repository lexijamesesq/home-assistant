- id: de214ebd382a4ab180129f62da343ea0
  alias: Enable Home Theater Playing Lighting
  triggers:
  - entity_id: media_player.living_room_apple_tv
    from: idle
    to: playing
    trigger: state
  - entity_id: media_player.living_room_apple_tv
    from: paused
    to: playing
    trigger: state
  actions:
  - action: script.turn_on
    target:
      entity_id:
