      - script.lighting_rec_room_canvas
- alias: Restore Home Theater On Lighting
  trigger:
  - platform: state
    entity_id: media_player.living_room_apple_tv
    from: playing
    to: paused
    for:
      seconds: 10
  - platform: state
    entity_id: media_player.living_room_apple_tv
    from: playing
    to: idle
    for:
      seconds: 1
  - platform: state
    entity_id: media_player.living_room_apple_tv
    from: paused
    to: idle
  action:
  - action: script.turn_on
    target:
      entity_id:
      - script.lighting_living_room_tv
      - script.lighting_rec_room_canvas
