        Lock') or is_state_attr('lock.august_web_garage_door', 'changed_by', 'Manual
        Unlock') %}\n  {% set message = 'manually ' ~ states('lock.august_web_garage_door')
        %}\n{% else %}\n  {% set message = states('lock.august_web_garage_door') ~
        ' by ' ~ state_attr('lock.august_web_garage_door', 'changed_by') %}\n{% endif
        %} The Garage Door was {{ message }}."
      data:
        url: /lovelace/security
        push:
          thread-id: ha-condo-group
          sound: basic-bit-shots.wav
    action: notify.mobile_app_alexis_iphone
  mode: single
- id: '1724791118711'
  alias: Circulate Stale Air
  description: ''
  trigger:
  - platform: time_pattern
    hours: /3
    minutes: 0
    seconds: 0
    id: start_downstairs_fan
  - platform: state
    entity_id: climate.downstairs
    attribute: fan_mode
    to: 'on'
    for: 00:04:00
    id: start_upstairs_fan
  - platform: state
    entity_id: climate.downstairs
    attribute: fan_mode
    to: 'on'
    for: 00:08:00
    id: stop_downstairs_fan
  - platform: state
    entity_id: climate.upstairs
    attribute: fan_mode
    to: 'on'
    for: 00:08:00
    id: stop_upstairs_fan
  condition:
  - condition: state
    entity_id: group.all_windows
    state: 'off'
  action:
  - choose:
    - conditions:
      - condition: trigger
        id: start_downstairs_fan
      sequence:
      - action: climate.set_fan_mode
        entity_id: climate.downstairs
        data:
          fan_mode: 'on'
    - conditions:
      - condition: trigger
        id: start_upstairs_fan
      sequence:
      - action: climate.set_fan_mode
        entity_id: climate.upstairs
        data:
          fan_mode: 'on'
    - conditions:
      - condition: trigger
        id: stop_downstairs_fan
      sequence:
      - action: climate.set_fan_mode
        entity_id: climate.downstairs
        data:
          fan_mode: 'off'
    - conditions:
      - condition: trigger
        id: stop_upstairs_fan
      sequence:
      - action: climate.set_fan_mode
        entity_id: climate.upstairs
        data:
          fan_mode: 'off'
