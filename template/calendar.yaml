- unique_id: calendar
  sensor:
    - name: Trash Pickup
      unique_id: trash_pickup
      icon: "mdi:delete"
      availability: "{{ has_value('calendar.trash_pickup') }}"
      state: >-
        {% set next = state_attr('calendar.trash_pickup', 'start_time') %}
        {% set next_date = next[:10] if next else '' %}
        {% set today = now().strftime('%Y-%m-%d') %}
        {% set tomorrow = (now() + timedelta(days=1)).strftime('%Y-%m-%d') %}
        {{ 'on' if next_date == today or (next_date == tomorrow and now().hour >= 17) else 'off' }}
      attributes:
        date: >-
          {% set next = state_attr('calendar.trash_pickup', 'start_time') %}
          {% set next_date = next[:10] if next else '' %}
          {% set today = now().strftime('%Y-%m-%d') %}
          {% set tomorrow = (now() + timedelta(days=1)).strftime('%Y-%m-%d') %}
          {{ 'Today' if next_date == today else ('Tomorrow' if next_date == tomorrow else as_datetime(next).strftime('%A')) }}
    - name: Recycling Pickup
      unique_id: recycling_pickup
      icon: "mdi:recycle"
      availability: "{{ has_value('calendar.recycling_pickup') }}"
      state: >-
        {% set next = state_attr('calendar.recycling_pickup', 'start_time') %}
        {% set next_date = next[:10] if next else '' %}
        {% set today = now().strftime('%Y-%m-%d') %}
        {% set tomorrow = (now() + timedelta(days=1)).strftime('%Y-%m-%d') %}
        {{ 'on' if next_date == today or (next_date == tomorrow and now().hour >= 17) else 'off' }}
      attributes:
        date: >-
          {% set next = state_attr('calendar.recycling_pickup', 'start_time') %}
          {% set next_date = next[:10] if next else '' %}
          {% set today = now().strftime('%Y-%m-%d') %}
          {% set tomorrow = (now() + timedelta(days=1)).strftime('%Y-%m-%d') %}
          {{ 'Today' if next_date == today else ('Tomorrow' if next_date == tomorrow else as_datetime(next).strftime('%A')) }}
    - name: House Cleaning
      unique_id: house_cleaning
      icon: "mdi:broom"
      availability: "{{ has_value('calendar.house_cleaning') }}"
      state: >-
        {% set next = state_attr('calendar.house_cleaning', 'start_time') %}
        {% set next_date = next[:10] if next else '' %}
        {% set today = now().strftime('%Y-%m-%d') %}
        {% set tomorrow = (now() + timedelta(days=1)).strftime('%Y-%m-%d') %}
        {{ 'on' if next_date == today or (next_date == tomorrow and now().hour >= 17) else 'off' }}
      attributes:
        date: >-
          {% set next = state_attr('calendar.house_cleaning', 'start_time') %}
          {% set next_date = next[:10] if next else '' %}
          {% set today = now().strftime('%Y-%m-%d') %}
          {% set tomorrow = (now() + timedelta(days=1)).strftime('%Y-%m-%d') %}
          {% set days_until = (as_datetime(next).replace(tzinfo=None) - now().replace(hour=0, minute=0, second=0, microsecond=0, tzinfo=None)).days if next else -1 %}
          {% if next_date == today %}
            Today
          {% elif next_date == tomorrow %}
            Tomorrow
          {% elif days_until <= 5 and days_until > 0 %}
            {{ as_datetime(next).strftime('%A') }}
          {% elif next %}
            {{ as_datetime(next).strftime('%B %-d') }}
          {% endif %}
