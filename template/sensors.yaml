# Template sensors migrated from sensor.yaml (legacy platform: template format)
# Migrated: 2026-03-21

# ──────────────────────────────────────────────
# Group 1: Mode monitoring sensors
# (Time-of-day mirrors removed — now input_select.time_of_day_mode)
# ──────────────────────────────────────────────
- sensor:
    - name: "Guest Mode"
      unique_id: mode_guest
      state: >
        {{ states('input_boolean.mode_guest') }}
      icon: "mdi:human-greeting"

    - name: "Home Theater Mode"
      unique_id: mode_home_theater
      state: >
        {{ states('input_boolean.mode_home_theater') }}
      icon: "mdi:theater"

    - name: "Sleep Mode"
      unique_id: mode_sleep
      state: >
        {{ states('input_boolean.mode_sleep') }}
      icon: "mdi:sleep"

    - name: "Simulate Presence Mode"
      unique_id: mode_simulate_presence
      state: >
        {% if is_state('input_boolean.mode_simulate_presence', 'on') %}
          {% if is_state("group.inside_lights", "on") %}
            Lights On
          {% else %}
            Lights Off
          {% endif %}
        {% else %}
          off
        {% endif %}

# ──────────────────────────────────────────────
# Group 2: Dashboard view sensors
# ──────────────────────────────────────────────
- sensor:
    - name: "Current Home Mode"
      unique_id: dashboard_current_home_mode
      state: >-
        {{ states('input_select.time_of_day_mode') }}
      icon: >-
        {% set mode = states('input_select.time_of_day_mode') %}
        {{ 'mdi:weather-hazy' if mode == 'Morning' else 'mdi:weather-sunny' if mode == 'Day' else 'mdi:weather-sunset' if mode == 'Sunset' else 'mdi:weather-night' if mode == 'Night' else 'mdi:weather-cloudy-alert' }}

    - name: "Current Mode"
      unique_id: dashboard_current_mode
      state: >-
        {% if is_state('input_boolean.mode_sleep', 'on') %}Sleep
        {% elif is_state('input_boolean.mode_laundry', 'on') %}Laundry
        {% elif is_state('input_boolean.mode_home_theater', 'on') %}Theater
        {% elif is_state('input_boolean.mode_house_cleaning', 'on') %}Cleaning
        {% elif is_state('input_boolean.mode_guest', 'on') %}Guest
        {% else %}{{ states('input_select.time_of_day_mode') }}{% endif %}
      icon: >-
        {% if is_state('input_boolean.mode_sleep', 'on') %}mdi:sleep
        {% elif is_state('input_boolean.mode_laundry', 'on') %}mdi:washing-machine
        {% elif is_state('input_boolean.mode_home_theater', 'on') %}mdi:theater
        {% elif is_state('input_boolean.mode_house_cleaning', 'on') %}mdi:broom
        {% elif is_state('input_boolean.mode_guest', 'on') %}mdi:human-greeting
        {% else %}{% set mode = states('input_select.time_of_day_mode') %}{{ 'mdi:weather-hazy' if mode == 'Morning' else 'mdi:weather-sunny' if mode == 'Day' else 'mdi:weather-sunset' if mode == 'Sunset' else 'mdi:weather-night' if mode == 'Night' else 'mdi:weather-cloudy-alert' }}{% endif %}

    - name: "Home State"
      unique_id: dashboard_home_state
      state: >-
        {% if states.binary_sensor.garage_actual.state == 'off' and states.lock.august_web_front_door.state == 'locked' and states.lock.august_web_garage_door.state == 'locked' and states.group.all_doors.state == 'off' %}
          Secure
        {% else %}
          Insecure
        {% endif %}
      icon: >-
        {% if states.binary_sensor.garage_actual.state == 'off' and states.lock.august_web_front_door.state == 'locked' and states.lock.august_web_garage_door.state == 'locked' and states.group.all_doors.state == 'off' %}
          mdi:shield-home
        {% else %}
          mdi:shield-off
        {% endif %}

    - name: "Occupancy State"
      unique_id: dashboard_occupancy_state
      state: >-
        {% if is_state("group.residents", "home") %}
          Resident
        {% elif is_state("sensor.mode_guest", "on") %}
          Guest
        {% else %}
          Cats
        {% endif %}
      icon: >-
        {% if is_state("group.residents", "home") %}
          mdi:account-multiple
        {% elif is_state("sensor.mode_guest", "on") %}
          mdi:human-greeting
        {% else %}
          mdi:cat
        {% endif %}

    - name: "Simulate Presence Status"
      unique_id: dashboard_simulate_presence_status
      state: >
        {% if is_state('input_boolean.mode_simulate_presence', 'on') %}
          Simulating presence.
        {% else %}
          off
        {% endif %}

    - name: "Garage Actual Status"
      unique_id: dashboard_garage_actual_status
      state: >-
        {{ 'off' if is_state("cover.garage_actual", "closed") else "Garage Actual is open." }}

    - name: "Garage Actual Status - Short"
      unique_id: dashboard_garage_actual_status_short
      state: >-
        {{ 'off' if is_state("cover.garage_actual", "closed") else "Open" }}

    - name: "Open Window Status"
      unique_id: dashboard_open_window_status
      state: >-
        {% set num_windows = states.binary_sensor
          | selectattr('entity_id', 'in', states.group.all_windows.attributes.entity_id)
          | selectattr('state', 'eq', 'on')
          | list
          | length
        %}
        {% set num_downstairs = states.binary_sensor
          | selectattr('entity_id', 'in', states.group.downstairs_windows.attributes.entity_id)
          | selectattr('state', 'eq', 'on')
          | list
          | length
        %}
        {% set num_upstairs = states.binary_sensor
          | selectattr('entity_id', 'in', states.group.upstairs_windows.attributes.entity_id)
          | selectattr('state', 'eq', 'on')
          | list
          | length
        %}

        {% if num_windows > 1 %}
          {% if num_downstairs == 0 %}
            {{ num_windows }} upstairs windows are open.
          {% elif num_upstairs == 0 %}
            {{ num_windows }} downstairs windows are open.
          {% else %}
            {{ num_windows }} windows are open.
          {% endif %}
        {% elif num_windows == 1 %}
          {% set open_window = states.binary_sensor
            | selectattr('entity_id', 'in', states.group.all_windows.attributes.entity_id)
            | selectattr('state', 'eq', 'on')
            | first
          %}
          {{ open_window.attributes.friendly_name }} are open.
        {% else %}
          off
        {% endif %}

    - name: "Open Window Status - Short"
      unique_id: dashboard_open_window_status_short
      state: >-
        {% set num_windows = states.binary_sensor
          | selectattr('entity_id', 'in', states.group.all_windows.attributes.entity_id)
          | selectattr('state', 'eq', 'on')
          | list
          | length
        %}

        {% if num_windows > 0 %}
          {{ num_windows }} Open
        {% else %}
          off
        {% endif %}

    - name: "Open Door Status"
      unique_id: dashboard_open_door_status
      state: >-
        {% set num_doors = states.binary_sensor
          | selectattr('entity_id', 'in', states.group.all_doors.attributes.entity_id)
          | selectattr('state', 'eq', 'on')
          | list
          | length
        %}

        {% if num_doors > 1 %}
          {{ num_doors }} doors are open.
        {% elif num_doors == 1 %}
          {% set open_door = states.binary_sensor
            | selectattr('entity_id', 'in', states.group.all_doors.attributes.entity_id)
            | selectattr('state', 'eq', 'on')
            | first
          %}
          {{ open_door.attributes.friendly_name }} is open.
        {% else %}
          off
        {% endif %}

    - name: "Open Door Status - Short"
      unique_id: dashboard_open_door_status_short
      state: >-
        {% set num_doors = states.binary_sensor
          | selectattr('entity_id', 'in', states.group.all_doors.attributes.entity_id)
          | selectattr('state', 'eq', 'on')
          | list
          | length
        %}

        {% if num_doors > 0 %}
          {{ num_doors }} Open
        {% else %}
          off
        {% endif %}

    - name: "Unlocked Door Status"
      unique_id: dashboard_unlocked_door_status
      state: >-
        {% set num = states.lock
          | selectattr('entity_id', 'in', states.group.all_locks.attributes.entity_id)
          | selectattr('state', 'eq', 'unlocked')
          | list
          | length
        %}

        {% if num == 2 %}
          Front Door and Garage Door are unlocked.
        {% elif num ==1 and is_state("lock.august_web_front_door", "unlocked") %}
          Front Door is unlocked.
        {% elif num ==1 and is_state("lock.august_web_garage_door", "unlocked") %}
          Garage Door is unlocked.
        {% else %}
          off
        {% endif %}

    - name: "Lights On Status"
      unique_id: dashboard_lights_on_status
      state: >-
        {% set num_lights = states.light
          | selectattr('entity_id', 'in', states.group.all_lights.attributes.entity_id)
          | selectattr('state', 'eq', 'on')
          | list
          | length
        %}

        {% if num_lights > 1 %}
          {{ num_lights }} lights are on.
        {% elif num_lights == 1 %}
          {% set lights_on = states.light
            | selectattr('entity_id', 'in', states.group.all_lights.attributes.entity_id)
            | selectattr('state', 'eq', 'on')
            | first
          %}
          {{ lights_on.attributes.friendly_name }} are on.
        {% else %}
          off
        {% endif %}

    - name: "Lights On Status - Short"
      unique_id: dashboard_lights_on_status_short
      state: >-
        {% set num_lights = states.light
          | selectattr('entity_id', 'in', states.group.all_lights.attributes.entity_id)
          | selectattr('state', 'eq', 'on')
          | list
          | length
        %}

        {% if num_lights > 0 %}
          {{ num_lights }} On
        {% else %}
          off
        {% endif %}

    - name: "Sonos Song Status"
      unique_id: dashboard_sonos_song_status
      state: >-
        {% set group_master = states("sensor.sonos_group_master") %}

        {% if group_master != none %}
          {% if is_state("sensor.sonos_group_master_state", "playing") %}
            {{ state_attr(group_master, "media_artist") }} – {{ state_attr(group_master, "media_title") }}
          {% else %}
            Nothing is playing.
          {% endif %}
        {% else %}
          off
        {% endif %}

    - name: "Sonos Speaker Status"
      unique_id: dashboard_sonos_speaker_status
      state: >-
        {% if group_master != none %}
          {{ state_attr(states("sensor.sonos_group_master"), "friendly_name") }} + {{ states("sensor.sonos_speakers_join").split(',') | length }}
        {% else %}
          off
        {% endif %}

    - name: "Bedroom Fan Filter"
      unique_id: dashboard_bedroom_fan_filter
      state: >-
        {% if states("sensor.bedroom_hepa_filter_remaining_life") | int(0) <= 33 %}
          on
        {% else %}
          off
        {% endif %}
      icon: "mdi:air-filter"

    - name: "Kitchen Fan Filter"
      unique_id: dashboard_kitchen_fan_filter
      state: >-
        {% if states("sensor.kitchen_combi_filter_remaining_life") | int(0) <= 33 %}
          on
        {% else %}
          off
        {% endif %}
      icon: "mdi:air-filter"

# ──────────────────────────────────────────────
# Group 7: Brightness curve
# Trigger-based: re-evaluates every 5 min and on mode changes.
# Outputs 0.0 (ceiling brightness) to 1.0 (floor brightness)
# during Night mode. Static 0.0 for all other modes.
# ──────────────────────────────────────────────
- trigger:
    - trigger: time_pattern
      minutes: "/5"
    - trigger: state
      entity_id: input_select.time_of_day_mode
    - trigger: homeassistant
      event: start
  sensor:
    - name: "Brightness Curve Position"
      unique_id: brightness_curve_position
      icon: mdi:brightness-auto
      state: >-
        {% set mode = states('input_select.time_of_day_mode') | lower %}
        {% if mode != 'night' %}
          0.0
        {% else %}
          {% set start = state_attr('input_datetime.sunset_ends', 'timestamp') | float(0) %}
          {% set end = state_attr('input_datetime.prefer_lighting_low_time', 'timestamp') | float(0) %}
          {% set now_s = now() | as_timestamp %}
          {% if start == 0 or end == 0 or start >= end %}
            0.5
          {% elif now_s <= start %}
            0.0
          {% elif now_s >= end %}
            1.0
          {% else %}
            {{ ((now_s - start) / (end - start)) | round(2) }}
          {% endif %}
        {% endif %}
      availability: >-
        {{ has_value('input_datetime.sunset_ends') and
           has_value('input_datetime.prefer_lighting_low_time') }}

# ──────────────────────────────────────────────
# Group 3: Sonos grouping sensors
# ──────────────────────────────────────────────
- sensor:
    - name: "Sonos Group Master"
      unique_id: sonos_group_master
      state: >-
        {%- set players = expand('group.sonos_players') -%}
        {%- for player in players if player.state == 'playing' and player.attributes.source is not defined and player.attributes.group_members[0] == player.entity_id %}
          {% if loop.last %}
            {{ player.entity_id }}
          {% endif %}
        {% else %}
          {{ 'media_player.sonos_'+ states('input_select.master_sonos') | lower | replace(" ", "_") }}
        {% endfor -%}

    - name: "Sonos Group Master - State"
      unique_id: sonos_group_master_state
      state: >-
        {%- set master = states('sensor.sonos_group_master') -%}
        {{- 'playing' if is_state(master, 'playing') else 'paused' -}}

    - name: "Sonos Group Master - Shuffle"
      unique_id: sonos_group_master_shuffle
      state: >-
        {%- set master = states('sensor.sonos_group_master') -%}
        {{- 'on' if is_state_attr(master, 'shuffle', true) else 'off' -}}

    - name: "Sonos Group Master - Repeat"
      unique_id: sonos_group_master_repeat
      state: >-
        {%- set master = states('sensor.sonos_group_master') -%}
        {{- 'on' if is_state_attr(master, 'repeat', 'all') else 'off' -}}

    - name: "Sonos Join Speakers"
      unique_id: sonos_speakers_join
      state: >-
        {% set master = states('sensor.sonos_group_master') %}
        {% for switch in states.input_boolean if "sonos" in switch.entity_id and switch.state == "on" and switch.entity_id|replace("input_boolean", "media_player") != master -%}
          {{ switch.entity_id|replace("input_boolean", "media_player") }}
          {%- if not loop.last -%}
            ,
          {%- endif %}
        {%- endfor %}

    - name: "Sonos Unjoin Speakers"
      unique_id: sonos_speakers_unjoin
      state: >-
        {% set master = states('sensor.sonos_group_master') %}
        {% for switch in states.input_boolean if "sonos" in switch.entity_id and switch.state == "off" and switch.entity_id|replace("input_boolean", "media_player") != master -%}
          {{ switch.entity_id|replace("input_boolean", "media_player") }}
          {%- if not loop.last -%}
            ,
          {%- endif %}
        {%- endfor %}

    - name: "Sonos Switches On"
      unique_id: sonos_switches_on
      state: >-
        {%- set master = 'media_player.sonos_'+ states('input_select.master_sonos') | lower | replace(" ", "_") -%}
        {%- set players = expand('group.sonos_players') -%}
        {%- for player in players if player.attributes.group_members | length > 0 and player.entity_id == master %}
          {%- set slaves = player.attributes.group_members %}
          {{ slaves|join(",")|replace("media_player", "input_boolean") }}
        {%- endfor %}

    - name: "Sonos Switches Off"
      unique_id: sonos_switches_off
      state: >-
        {%- set master = 'media_player.sonos_'+ states('input_select.master_sonos') | lower | replace(" ", "_") -%}
        {%- set players = expand('group.sonos_players') -%}
        {%- for player in players if player.attributes.group_members | length == 1 and player.entity_id != master -%}
          {{ player.entity_id|replace("media_player", "input_boolean") }}
          {%- if not loop.last -%}
            ,
          {%- endif -%}
        {%- endfor %}

