      unique_id: climate_downstairs_sleep_mode_cool
      state: 80
      unit_of_measurement: "ºF"

    - name: "Downstairs Nest Sleep Mode - Heat"
      unique_id: climate_downstairs_sleep_mode_heat
      state: 76
      unit_of_measurement: "ºF"

    - name: "Upstairs Nest Sleep Mode - Cool"
      unique_id: climate_upstairs_sleep_mode_cool
      state: 74
      unit_of_measurement: "ºF"

    - name: "Upstairs Nest Sleep Mode - Heat"
      unique_id: climate_upstairs_sleep_mode_heat
      state: 74
      unit_of_measurement: "ºF"

# ──────────────────────────────────────────────
# Group 6: States for conditionals
# ──────────────────────────────────────────────
- sensor:
    - name: "State - All Services Up"
      unique_id: state_all_services_up
      state: >-
        {% set services = [
          "sensor.service_status_home_assistant",
          "sensor.service_status_plex",
          "sensor.service_status_sonarr",
          "sensor.service_status_sabnzbd",
          "sensor.service_status_tautulli",
          "sensor.service_status_grafana",
          "sensor.service_status_unifi_network",
          "sensor.service_status_unifi_protect"
        ] %}

        {{ 'on' if states.sensor
          | selectattr('entity_id', 'in', services)
          | selectattr('state', 'eq', 'Down')
          | list
          | count == 0
          else 'off'
        }}

    - name: "State - All VPN WANs Down"
      unique_id: state_all_vpn_wan_down
      state: >-
        {% set networks = [
          "sensor.network_status_vpn_wan",
          "sensor.network_status_vpn2_wan",
          "sensor.network_status_vpn3_wan",
        ] %}

        {{ 'on' if states.sensor
          | selectattr('entity_id', 'in', networks)
          | selectattr('state', 'eq', 'Down')
          | list
          | count == 3
          else 'off'
        }}

    - name: "State - HA New Major Version"
      unique_id: state_ha_new_major_version
      state: >-
        {%- if states.sensor.current_version.state is defined and states.sensor.latest_version.state is defined -%}
          {{- "on" if states("sensor.latest_version").rsplit(".", 1)[0] > states("sensor.current_version").rsplit(".", 1)[0] else "off" -}}
        {%- else -%}
          unknown
        {%- endif %}
