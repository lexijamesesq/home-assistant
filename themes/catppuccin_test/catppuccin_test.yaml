  ######################
  # HA Semantic Colors #
  ######################
  # This section resets HA's semantic colors to their "light mode" settings. We do
  # this because due to the way this theme works it is much easier to swap out the
  # underlying palette than the semantic uses of it.
  #
  # Last synced from: https://github.com/home-assistant/frontend/blob/60c5888f6ba960e41c23396a389134191c567507/src/resources/theme/color/semantic.globals.ts

  ha-color-focus: var(--ha-color-orange-60)

  # Text
  ha-color-text-primary: var(--catppuccin-text)
  ha-color-text-secondary: var(--catppuccin-subtext1)
  ha-color-text-disabled: var(--catppuccin-overlay1)
  ha-color-text-link: var(--catppuccin-blue)

  # Border primary
  ha-color-border-primary-quiet: var(--ha-color-primary-90)
  ha-color-border-primary-normal: var(--ha-color-primary-70)
  ha-color-border-primary-loud: var(--ha-color-primary-40)

  # Border neutral
  ha-color-border-neutral-quiet: var(--catppuccin-surface1)  # MUSH: subtler
  ha-color-border-neutral-normal: var(--catppuccin-surface2)  # MUSH: subtler
  ha-color-border-neutral-loud: var(--ha-color-neutral-40)

  # Border danger
  ha-color-border-danger-quiet: var(--ha-color-red-90)
  ha-color-border-danger-normal: var(--ha-color-red-70)
  ha-color-border-danger-loud: var(--ha-color-red-40)

  # Border warning
  ha-color-border-warning-quiet: var(--ha-color-orange-90)
  ha-color-border-warning-normal: var(--ha-color-orange-70)
  ha-color-border-warning-loud: var(--ha-color-orange-40)

  # Border success
  ha-color-border-success-quiet: var(--ha-color-green-90)
  ha-color-border-success-normal: var(--ha-color-green-70)
  ha-color-border-success-loud: var(--ha-color-green-40)

  # Fill primary quiet
  ha-color-fill-primary-quiet-resting: var(--ha-color-primary-95)
  ha-color-fill-primary-quiet-hover: var(--ha-color-primary-90)
  ha-color-fill-primary-quiet-active: var(--ha-color-primary-95)

  # Fill primary normal
  ha-color-fill-primary-normal-resting: var(--ha-color-primary-90)
  ha-color-fill-primary-normal-hover: var(--ha-color-primary-80)
  ha-color-fill-primary-normal-active: var(--ha-color-primary-90)

  # Fill primary loud
  ha-color-fill-primary-loud-resting: var(--ha-color-primary-40)
  ha-color-fill-primary-loud-hover: var(--ha-color-primary-30)
  ha-color-fill-primary-loud-active: var(--ha-color-primary-40)

  # Fill neutral quiet
  ha-color-fill-neutral-quiet-resting: var(--ha-color-neutral-95)
  ha-color-fill-neutral-quiet-hover: var(--ha-color-neutral-90)
  ha-color-fill-neutral-quiet-active: var(--ha-color-neutral-95)

