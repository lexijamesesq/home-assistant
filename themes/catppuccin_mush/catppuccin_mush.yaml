####################################################
# Catppuccin Mush
#
# Base: catppuccin/home-assistant v2.1.3 (Frappe)
# Layer: Mush pastel restoration + aesthetic overrides
#
# Structure:
#   1. Catppuccin Frappe palette (upstream, do not modify)
#   2. HA color palette ramps (upstream, do not modify)
#   3. HA semantic colors (upstream, with Mush surface override)
#   4. HA standard variables (upstream base, Mush overrides in-place)
#   5. Additional Mush variables (sidebar, cards, switches, etc.)
#   6. Mushroom card variables (RGB colors, layout, state colors)
#
# Overrides are marked with "# Mush:" comments.
# When updating from upstream, diff sections 1-4 against the
# distribution and merge, preserving lines marked "# Mush:".
####################################################

