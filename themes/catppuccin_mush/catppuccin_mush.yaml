  ###################################
  # HA Standard Variables           #
  # Base: v2.1.3, Mush in-place    #
  ###################################
  primary-text-color: var(--ha-color-text-primary)
  secondary-text-color: var(--ha-color-text-secondary)
  # Mush: pastel restoration (dist: catppuccin-crust)
  text-primary-color: var(--catppuccin-text)
  # Mush: pastel restoration (dist: catppuccin-crust)
  text-light-primary-color: var(--catppuccin-text)
  disabled-text-color: var(--catppuccin-overlay1)

  # Mush: blue primary (dist: ha-color-primary-40 / mauve)
  primary-color: var(--catppuccin-blue)
  dark-primary-color: var(--primary-color)
  darker-primary-color: var(--primary-color)
  light-primary-color: var(--primary-color)
  # Mush: yellow accent (dist: primary-color)
  accent-color: var(--catppuccin-yellow)
  divider-color: rgba(var(--catppuccin-overlay1-rgb), 0.15)
  outline-color: var(--catppuccin-crust)
  outline-hover-color: var(--catppuccin-surface2)

  # Mush: RGB vars match our primary/accent choices
  rgb-primary-color: var(--catppuccin-blue-rgb)
  rgb-accent-color: var(--catppuccin-yellow-rgb)
  rgb-primary-text-color: var(--catppuccin-text-rgb)
  rgb-secondary-text-color: var(--catppuccin-subtext1-rgb)
  rgb-text-primary-color: var(--catppuccin-text-rgb)
  # Mush: matches our card-background-color (surface0)
  rgb-card-background-color: var(--catppuccin-surface0-rgb)

  rgb-warning-color: var(--catppuccin-yellow-rgb)
  rgb-error-color: var(--catppuccin-red-rgb)
  rgb-success-color: var(--catppuccin-green-rgb)
  rgb-info-color: var(--catppuccin-blue-rgb)

  scrollbar-thumb-color: var(--primary-color)

  error-color: var(--catppuccin-red)
  warning-color: var(--catppuccin-yellow)
  success-color: var(--catppuccin-green)
  info-color: var(--catppuccin-blue)

  # Mush: background layering — base for main, surface0 for cards
  # (dist: mantle for main, base for cards)
  card-background-color: var(--catppuccin-surface0)
  primary-background-color: var(--catppuccin-base)
  secondary-background-color: var(--catppuccin-base)
  clear-background-color: var(--card-background-color)
  # HA 2026.x view background variables
  lovelace-background: var(--primary-background-color)
  view-background: var(--primary-background-color)

  label-badge-grey: var(--secondary-text-color)

  # Mush: pastel icon color (dist: primary-color / mauve blend)
  state-icon-color: var(--catppuccin-lavender)

  energy-grid-consumption-color: var(--catppuccin-lavender)
  energy-grid-return-color: var(--catppuccin-mauve)
  energy-solar-color: var(--catppuccin-yellow)
  energy-non-fossil-color: var(--catppuccin-green)
  energy-battery-out-color: var(--catppuccin-teal)
  energy-battery-in-color: var(--catppuccin-pink)
  energy-gas-color: var(--catppuccin-red)
  energy-water-color: var(--catppuccin-sky)

  ##################################
  # HA Named Colors (Mush tuned)  #
  ##################################
  # Hand-tuned for softer rendering on dark backgrounds.
  # Where values match the Catppuccin palette, we use the var reference.
  # Where values are custom hex, they're Mush-specific aesthetic choices.
  disabled-color: var(--catppuccin-overlay1)
  red-color: var(--catppuccin-red)
  pink-color: var(--catppuccin-pink)
  purple-color: var(--catppuccin-mauve)
  # Mush: muted purple (dist: catppuccin-mauve)
  deep-purple-color: var(--catppuccin-overlay2)
  # Mush: hand-tuned softer values (dist: palette direct)
  indigo-color: "#7891cc"
  blue-color: "#6A9AF2"
  light-blue-color: var(--catppuccin-sky)
  cyan-color: "#6daaa1"
  teal-color: var(--catppuccin-teal)
  green-color: "#88BC72"
  light-green-color: "#98c07d"
  lime-color: "#bac486"
  yellow-color: var(--catppuccin-yellow)
  amber-color: "#e3b37c"
  orange-color: "#e1936e"
  deep-orange-color: "#d18567"
  # Mush: dark brown (dist: catppuccin-flamingo)
  brown-color: var(--catppuccin-surface0)
  # Mush: grey scale uses overlay tones for visibility
  light-grey-color: var(--catppuccin-overlay1)
  grey-color: var(--catppuccin-overlay0)
  dark-grey-color: var(--catppuccin-surface1)
  blue-grey-color: var(--catppuccin-lavender)
  # Mush: non-inverted mapping (dist inverts for dark mode)
  black-color: var(--catppuccin-crust)
  white-color: var(--catppuccin-text)

  state-active-color: var(--catppuccin-mauve)

  ######################
  # Input & Form       #
  ######################
  input-idle-line-color: var(--primary-text-color)
  input-hover-line-color: var(--accent-color)
  input-disabled-line-color: var(--disabled-text-color)
  input-outlined-idle-border-color: var(--disabled-text-color)
  input-outlined-hover-border-color: var(--disabled-text-color)
  input-outlined-disabled-border-color: var(--disabled-text-color)
  input-fill-color: var(--primary-background-color)
  input-disabled-fill-color: var(--catppuccin-surface1)
  input-ink-color: var(--primary-text-color)
  input-label-ink-color: var(--secondary-text-color)
  input-disabled-ink-color: var(--disabled-text-color)
  input-dropdown-icon-color: var(--secondary-text-color)

  ################
  # Sidebar      #
  ################
  sidebar-background-color: var(--catppuccin-crust)
  # Mush: explicit sidebar styling (not in dist)
  sidebar-selected-background-color: var(--primary-background-color)
  sidebar-icon-color: var(--catppuccin-subtext0)
  sidebar-text-color: var(--catppuccin-subtext0)
  sidebar-selected-icon-color: var(--catppuccin-mauve)
  sidebar-selected-text-color: var(--catppuccin-mauve)

  ################
  # App Header   #
  ################
