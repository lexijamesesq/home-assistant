simulate_presence:
  alias: Simulate Presence
  sequence:
    repeat:
      while:
      - condition: state
        entity_id: input_boolean.mode_simulate_presence
        state: 'on'
      sequence:
      - service: script.turn_on
        data:
          entity_id: '{{ states.group.simulate_presence_scenes.attributes.entity_id
            | random }}'
      - delay: 00:{{ (range(35, 55) | random) }}:00
      - service: light.turn_off
        entity_id: group.inside_lights
      - delay: 00:{{ (range(2, 10) | random) }}:00
update_lights:
  alias: Update Lights
  icon: mdi:lightbulb-on
  mode: parallel
  sequence:
  - condition: template
    value_template: '{{ lights is defined }}'
  - service: script.turn_on
    data:
      entity_id: "{% set time        = as_timestamp(now()) | timestamp_custom(\"%H:%M:%S\")
        %} {% set prefer_low  = as_timestamp(states(\"input_datetime.prefer_lighting_low_time\"))
        | timestamp_custom(\"%H:%M:%S\") %} {% set prefer_mid  = as_timestamp(states(\"input_datetime.prefer_lighting_mid_time\"))
        | timestamp_custom(\"%H:%M:%S\") %} {% set prefer_high = as_timestamp(states(\"input_datetime.prefer_lighting_high_time\"))
        | timestamp_custom(\"%H:%M:%S\") %}\n{% set ht_lights = [\"kitchen\", \"living_room\",
        \"living_room_tv\", \"rec_room_canvas\"] %} {% set ambient_lights = [\"living_room_tv\",
        \"rec_room_canvas\", \"den_cabinets\", \"patio_string_lights\"]
        %}\n{% set mode = '_' + states('sensor.dashboard_current_home_mode') | lower
        %}\n{% if is_state('input_boolean.mode_home_theater', 'on') %}\n  {% if is_state('media_player.living_room_apple_tv',
        'playing') %}\n    {% set ht = \"_ht_playing\" %}\n  {% else %}\n    {% set
        ht = \"_ht_on\" %}\n  {% endif %}\n{% else %}\n  {% set ht = \"\" %}\n{% endif
        %}\n{% if time >= prefer_low or time < prefer_high %}\n  {% set brightness
        = \"_low\" %}\n{% elif time >= prefer_mid %}\n  {% set brightness = \"_mid\"
        %}\n{% else %}\n  {% set brightness = \"_mid\" if trigger is defined else
        \"_high\" %}\n{% endif %}\n{% for light in lights -%}\n  script.scene_{{ light
        }}{{ mode }}{{ ht if light in ht_lights }}{{ brightness if light not in ambient_lights
        }}\n  {%- if not loop.last -%}\n    ,\n  {%- endif %}\n{%- endfor %}\n"
