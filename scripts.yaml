  icon: mdi:lightbulb
  mode: restart
  sequence:
  - variables:
      mode_key: '{{ states(''sensor.dashboard_current_home_mode'') | lower }}'
      is_day: '{{ mode_key == ''day'' }}'
      is_sleep: '{{ is_state(''input_boolean.mode_sleep'', ''on'') }}'
      sleep_recently_ended: '{{ is_state(''input_boolean.mode_sleep'', ''off'') and
        (as_timestamp(now()) - as_timestamp(states.input_boolean.mode_sleep.last_changed))
        < 300 }}'
      color_temp: '{{ 3000 if is_sleep else 3500 }}'
  - choose:
    - conditions:
      - '{{ is_day and not sleep_recently_ended }}'
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.bedroom
    default:
    - parallel:
      - action: light.turn_on
        target:
          entity_id: light.bedroom
        data:
          brightness: 75
          color_temp_kelvin: '{{ color_temp }}'
          transition: 2
      - action: light.turn_on
        target:
          entity_id: light.bedroom_switch
        data:
          brightness: 75
    - delay:
        seconds: 2
    - action: input_select.select_option
