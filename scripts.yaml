scene_patio_sunset_high:
  alias: Scene Patio Sunset High
  variables:
    holiday: '{{ is_state("calendar.holiday_lighting", "on") }}'
  sequence:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ holiday and is_state_attr("calendar.holiday_lighting",
          "message", "holiday name") }}'
      sequence:
      - entity_id: script.scene_patio_neutral
        action: script.turn_on
    - conditions:
      - condition: template
        value_template: '{{ holiday and is_state_attr("calendar.holiday_lighting",
          "message", "Christmas") }}'
      sequence:
      - entity_id: light.patio
        action: light.turn_off
    default:
    - entity_id: script.scene_patio_neutral
      action: script.turn_on
scene_patio_blue_purple:
  alias: Scene Patio Blue & Purple
  sequence:
  - service: automation.turn_off
    entity_id: automation.downstairs_patio_dimmer_lights_sync
  - parallel:
    - service: light.turn_on
      entity_id: light.downstairs_patio_1
      data:
        transition: 2
        brightness: 100
        rgb_color:
        - 69
        - 63
        - 255
    - service: light.turn_on
      entity_id: light.downstairs_patio_2
      data:
        transition: 2
        brightness: 100
        rgb_color:
        - 193
        - 0
        - 255
    - service: light.turn_on
      entity_id: light.downstairs_patio_3
      data:
        transition: 2
        brightness: 100
        rgb_color:
        - 69
        - 63
        - 255
  - delay:
      seconds: 2
  - service: automation.turn_on
    entity_id: automation.downstairs_patio_dimmer_lights_sync
scene_patio_neutral:
  alias: Scene Patio Neutral
  sequence:
  - parallel:
    - entity_id: light.downstairs_patio
      data:
        transition: 2
        brightness: 50
        color_temp_kelvin: 2500
      action: light.turn_on
    - entity_id: light.upstairs_patio
      data:
        transition: 2
