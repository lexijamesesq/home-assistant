# ══════════════════════════════════════════════════
# Option C Lighting Scripts
# Per-room scripts with curated data headers.
# ══════════════════════════════════════════════════
lighting_kitchen:
  alias: Lighting - Kitchen
  icon: mdi:lightbulb
  mode: restart
  fields:
    mode:
      description: Time-of-day mode
      example: Night
    brightness_level:
      description: Brightness tier
      example: mid
    ht_state:
      description: Home theater state
      example: none
  sequence:
  - variables:
      brightness:
        morning: {high: 13, mid: 13, low: 13}
        sunset: {high: 145, mid: 145, low: 145}
        night: {high: 145, mid: 90, low: 35}
      ht_playing_brightness: 13
      transitions:
        default: 2
        ht_playing: 5
      is_day: "{{ mode | lower == 'day' }}"
      is_ht_playing: "{{ ht_state == 'playing' }}"
      transition: >-
        {{ transitions.ht_playing if is_ht_playing else transitions.default }}
      target_brightness: >-
        {% if is_day %}
          off
        {% elif is_ht_playing %}
          {{ ht_playing_brightness }}
        {% else %}
          {% set mode_key = mode | lower %}
          {% set level = brightness_level | default('high') %}
          {{ brightness[mode_key][level] | default(brightness[mode_key].high | default(13)) }}
        {% endif %}
  - if:
    - "{{ target_brightness == 'off' }}"
    then:
    - condition: state
      entity_id: light.kitchen
      state: 'on'
    - action: light.turn_off
      target:
        entity_id: light.kitchen
    else:
    - action: light.turn_on
      target:
        entity_id: light.kitchen
      data:
        brightness: "{{ target_brightness | int }}"
        transition: "{{ transition }}"
lighting_living_room:
  alias: Lighting - Living Room
  icon: mdi:lightbulb
  mode: restart
  fields:
    mode:
      description: Time-of-day mode
      example: Night
    brightness_level:
      description: Brightness tier
      example: mid
    ht_state:
      description: Home theater state
      example: none
  sequence:
  - variables:
      brightness:
        night: {high: 190, mid: 120, low: 50}
      ht_on_brightness:
        night: {high: 100, mid: 60, low: 25}
      ht_playing_kill_lights:
      - light.living_room
      - light.downstairs_hallway
      - light.upstairs_hallway_group
      - light.bedroom_hallway
      transitions:
        default: 2
        ht_playing: 5
      is_day: "{{ mode | lower in ['day', 'morning'] }}"
      is_sunset: "{{ mode | lower == 'sunset' }}"
      is_ht_playing: "{{ ht_state == 'playing' }}"
      is_ht_on: "{{ ht_state == 'on' }}"
      effective_mode: "{{ 'night' if is_sunset else mode | lower }}"
      transition: >-
        {{ transitions.ht_playing if is_ht_playing else transitions.default }}
      target_brightness: >-
        {% if is_day %}
          off
        {% elif is_ht_playing %}
          off
        {% elif is_ht_on %}
          {% set level = brightness_level | default('high') %}
          {{ ht_on_brightness[effective_mode][level] | default(ht_on_brightness.night[level] | default(25)) }}
        {% else %}
          {% set level = brightness_level | default('high') %}
          {{ brightness[effective_mode][level] | default(brightness.night[level] | default(50)) }}
        {% endif %}
  - choose:
    - conditions:
      - "{{ is_ht_playing and not is_day }}"
      sequence:
      - action: light.turn_off
        target:
          entity_id: "{{ ht_playing_kill_lights }}"
    - conditions:
      - "{{ target_brightness == 'off' }}"
      sequence:
      - condition: state
        entity_id: light.living_room
        state: 'on'
      - action: light.turn_off
        target:
          entity_id: light.living_room
    default:
    - action: light.turn_on
      target:
        entity_id: light.living_room
      data:
        brightness: "{{ target_brightness | int }}"
        transition: "{{ transition }}"
lighting_rec_room_canvas:
  alias: Lighting - Rec Room Canvas
  icon: mdi:lightbulb
  mode: restart
  fields:
    mode:
      description: Time-of-day mode
    brightness_level:
      description: Brightness tier
    ht_state:
      description: Home theater state
  sequence:
  - variables:
      is_sunset: "{{ mode | lower == 'sunset' }}"
      effective_mode: "{{ 'night' if is_sunset else mode | lower }}"
      is_ht_playing: "{{ ht_state == 'playing' }}"
      is_day_no_ht: "{{ effective_mode == 'day' and ht_state == 'none' }}"
      action: >-
        {% if is_ht_playing %}
          conditional_off
        {% elif is_day_no_ht %}
          mood_always
        {% else %}
          mood_if_off
        {% endif %}
  - choose:
    - conditions:
      - "{{ action == 'conditional_off' }}"
      sequence:
      - condition: state
        entity_id: light.rec_room_canvas
        state: 'on'
      - action: light.turn_off
        target:
          entity_id: light.rec_room_canvas
    - conditions:
      - "{{ action == 'mood_always' }}"
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.rec_room_canvas
        data:
          effect: Mood
    - conditions:
      - "{{ action == 'mood_if_off' }}"
      sequence:
      - condition: state
        entity_id: light.rec_room_canvas
        state: 'off'
      - action: light.turn_on
        target:
          entity_id: light.rec_room_canvas
        data:
          effect: Mood
