sonos_volume_ramp_up:
  alias: Sonos Volume Ramp Up
  variables:
    increment: 0.01
  sequence:
  - repeat:
      while:
      - condition: or
        conditions:
        - condition: template
          value_template: '{{ state_attr("media_player.sonos_kitchen", "volume_level")
            | default(0) < states("input_number.sonos_kitchen_volume") | float }}'
        - condition: template
          value_template: '{{ state_attr("media_player.sonos_living_room", "volume_level")
            | default(0) < states("input_number.sonos_living_room_volume") | float
            }}'
        - condition: template
          value_template: '{{ state_attr("media_player.sonos_rec_room", "volume_level")
            | default(0) < states("input_number.sonos_rec_room_volume") | float }}'
        - condition: template
          value_template: '{{ state_attr("media_player.sonos_bedroom", "volume_level")
            | default(0) < states("input_number.sonos_bedroom_volume") | float }}'
        - condition: template
          value_template: '{{ state_attr("media_player.sonos_bathroom", "volume_level")
            | default(0) < states("input_number.sonos_bathroom_volume") | float }}'
      - condition: template
        value_template: '{{ is_state("sensor.sonos_group_master_state", "playing")
          and repeat.index <= 5 }}'
      sequence:
      - delay: 00:01:00
      - data:
          entity_id: media_player.sonos_kitchen
          volume_level: '{{ (state_attr("media_player.sonos_kitchen", "volume_level")
            | default(0) + increment) | round(2, "floor") if state_attr("media_player.sonos_kitchen",
            "volume_level") | default(0) < states("input_number.sonos_kitchen_volume")
            | float else states("input_number.sonos_kitchen_volume") | float }}'
        action: media_player.volume_set
      - data:
          entity_id: media_player.sonos_living_room
          volume_level: '{{ (state_attr("media_player.sonos_living_room", "volume_level")
            | default(0) + increment) | round(2, "floor") if state_attr("media_player.sonos_living_room",
            "volume_level") | default(0) < states("input_number.sonos_living_room_volume")
            | float else states("input_number.sonos_living_room_volume") | float }}'
        action: media_player.volume_set
      - data:
          entity_id: media_player.sonos_rec_room
          volume_level: '{{ (state_attr("media_player.sonos_rec_room", "volume_level")
            | default(0) + increment) | round(2, "floor") if state_attr("media_player.sonos_rec_room",
            "volume_level") | default(0) < states("input_number.sonos_rec_room_volume")
            | float else states("input_number.sonos_rec_room_volume") | float }}'
        action: media_player.volume_set
      - data:
          entity_id: media_player.sonos_bedroom
          volume_level: '{{ (state_attr("media_player.sonos_bedroom", "volume_level")
            | default(0) + increment) | round(2, "floor") if state_attr("media_player.sonos_bedroom",
            "volume_level") | default(0) < states("input_number.sonos_bedroom_volume")
            | float else states("input_number.sonos_bedroom_volume") | float }}'
        action: media_player.volume_set
      - data:
          entity_id: media_player.sonos_bathroom
          volume_level: '{{ (state_attr("media_player.sonos_bathroom", "volume_level")
            | default(0) + increment) | round(2, "floor") if state_attr("media_player.sonos_bathroom",
            "volume_level") | default(0) < states("input_number.sonos_bathroom_volume")
            | float else states("input_number.sonos_bathroom_volume") | float }}'
        action: media_player.volume_set
  mode: queued
lighting_kitchen:
  alias: Lighting - Kitchen
  icon: mdi:lightbulb
  mode: restart
  sequence:
  - variables:
      brightness:
        morning: 13
        sunset: 145
        night_ceiling: 145
        night_floor: 35
        nightlight: 5
      ht_playing_brightness: 13
      transitions:
        default: 2
        ht_playing: 5
      mode_key: '{{ states(''sensor.dashboard_current_home_mode'') | lower }}'
      curve: '{{ states(''sensor.brightness_curve_position'') | float(0.5) }}'
      is_sleep: '{{ is_state(''input_boolean.mode_sleep'', ''on'') }}'
      is_day: '{{ mode_key == ''day'' }}'
      is_ht_playing: '{{ is_state(''input_boolean.mode_home_theater'', ''on'') and
        is_state(''media_player.living_room_apple_tv'', ''playing'') }}'
      transition: '{{ transitions.ht_playing if is_ht_playing else transitions.default }}'
      target_brightness: '{% if is_day %}off{% elif is_sleep %}{{ brightness.nightlight
        }}{% elif is_ht_playing %}{{ ht_playing_brightness }}{% elif mode_key == ''night''
        %}{{ ((brightness.night_ceiling - brightness.night_floor) * (1.0 - curve) +
        brightness.night_floor) | round(0) | int }}{% else %}{{ brightness[mode_key]
        | default(13) }}{% endif %}'
  - if:
    - '{{ target_brightness == ''off'' }}'
    then:
    - condition: state
      entity_id: light.kitchen
      state: 'on'
    - action: light.turn_off
      target:
        entity_id: light.kitchen
    else:
    - action: light.turn_on
      target:
        entity_id: light.kitchen
      data:
        brightness: '{{ target_brightness | int }}'
        transition: '{{ transition }}'
lighting_living_room:
  alias: Lighting - Living Room
  icon: mdi:lightbulb
  mode: restart
  sequence:
  - variables:
      brightness:
        night_ceiling: 190
        night_floor: 50
        nightlight: 10
      ht_on_brightness:
        night_ceiling: 100
        night_floor: 25
      ht_playing_kill_lights:
      - light.living_room
      - light.downstairs_hallway
      - light.upstairs_hallway_group
      - light.bedroom_hallway
      transitions:
        default: 2
        ht_playing: 5
      mode_key: '{{ states(''sensor.dashboard_current_home_mode'') | lower }}'
      curve: '{{ states(''sensor.brightness_curve_position'') | float(0.5) }}'
      is_sleep: '{{ is_state(''input_boolean.mode_sleep'', ''on'') }}'
      is_day: '{{ mode_key in [''day'', ''morning''] }}'
      is_ht_playing: '{{ is_state(''input_boolean.mode_home_theater'', ''on'') and
        is_state(''media_player.living_room_apple_tv'', ''playing'') }}'
      is_ht_on: '{{ is_state(''input_boolean.mode_home_theater'', ''on'') and not
        is_state(''media_player.living_room_apple_tv'', ''playing'') }}'
      transition: '{{ transitions.ht_playing if is_ht_playing else transitions.default }}'
      target_brightness: '{% if is_day %}off{% elif is_ht_playing %}off{% elif is_sleep
        %}{{ brightness.nightlight }}{% elif is_ht_on %}{{ ((ht_on_brightness.night_ceiling
        - ht_on_brightness.night_floor) * (1.0 - curve) + ht_on_brightness.night_floor)
        | round(0) | int }}{% else %}{{ ((brightness.night_ceiling - brightness.night_floor)
        * (1.0 - curve) + brightness.night_floor) | round(0) | int }}{% endif %}'
  - choose:
    - conditions:
      - '{{ is_ht_playing and not is_day }}'
      sequence:
      - action: light.turn_off
        target:
          entity_id: '{{ ht_playing_kill_lights }}'
    - conditions:
      - '{{ target_brightness == ''off'' }}'
      sequence:
      - condition: state
        entity_id: light.living_room
        state: 'on'
      - action: light.turn_off
        target:
          entity_id: light.living_room
    default:
    - action: light.turn_on
      target:
        entity_id: light.living_room
      data:
        brightness: '{{ target_brightness | int }}'
        transition: '{{ transition }}'
lighting_rec_room_canvas:
  alias: Lighting - Rec Room Canvas
  icon: mdi:lightbulb
  mode: restart
  sequence:
  - variables:
      mode_key: '{{ states(''sensor.dashboard_current_home_mode'') | lower }}'
      ht_state: '{{ ''playing'' if is_state(''input_boolean.mode_home_theater'', ''on'') and is_state(''media_player.living_room_apple_tv'', ''playing'') else (''on'' if is_state(''input_boolean.mode_home_theater'', ''on'') else ''none'') }}'
      is_sunset: '{{ mode_key == ''sunset'' }}'
      effective_mode: '{{ ''night'' if is_sunset else mode_key }}'
      is_ht_playing: '{{ ht_state == ''playing'' }}'
      is_day_no_ht: '{{ effective_mode == ''day'' and ht_state == ''none'' }}'
      action: "{% if is_ht_playing %}\n  conditional_off\n{% elif is_day_no_ht %}\n
        \ mood_always\n{% else %}\n  mood_if_off\n{% endif %}"
  - choose:
    - conditions:
      - '{{ action == ''conditional_off'' }}'
      sequence:
      - condition: state
        entity_id: light.rec_room_canvas
        state: 'on'
      - action: light.turn_off
        target:
          entity_id: light.rec_room_canvas
    - conditions:
      - '{{ action == ''mood_always'' }}'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.rec_room_canvas
        data:
          effect: Mood
    - conditions:
      - '{{ action == ''mood_if_off'' }}'
      sequence:
      - condition: state
        entity_id: light.rec_room_canvas
        state: 'off'
      - action: light.turn_on
        target:
          entity_id: light.rec_room_canvas
        data:
          effect: Mood
lighting_downstairs_hallway:
  alias: Lighting - Downstairs Hallway
  icon: mdi:lightbulb
  mode: restart
  sequence:
  - variables:
      mode_key: '{{ states(''sensor.dashboard_current_home_mode'') | lower }}'
      brightness_level: '{{ ''low'' if (states(''sensor.brightness_curve_position'') | float(0.0)) >= 1.0 else (''mid'' if (states(''sensor.brightness_curve_position'') | float(0.0)) >= 0.5 else ''high'') }}'
      brightness:
        morning:
          high: 25
          mid: 25
          low: 25
        day:
          high: 95
          mid: 45
          low: 25
        sunset:
          high: 75
          mid: 50
          low: 25
        night:
          high: 75
          mid: 50
          low: 25
      is_sunset: '{{ mode_key == ''sunset'' }}'
      effective_mode: '{{ ''night'' if is_sunset else mode_key }}'
      level: '{{ brightness_level }}'
      target_brightness: '{{ brightness[effective_mode][level] | default(brightness.night[level]
        | default(25)) }}'
  - action: light.turn_on
    target:
      entity_id: light.downstairs_hallway
    data:
      brightness: '{{ target_brightness | int }}'
      transition: 2
lighting_upstairs_hallway_group:
  alias: Lighting - Upstairs Hallway Group
  icon: mdi:lightbulb
  mode: restart
  sequence:
  - variables:
      mode_key: '{{ states(''sensor.dashboard_current_home_mode'') | lower }}'
      ht_state: '{{ ''playing'' if is_state(''input_boolean.mode_home_theater'', ''on'') and is_state(''media_player.living_room_apple_tv'', ''playing'') else (''on'' if is_state(''input_boolean.mode_home_theater'', ''on'') else ''none'') }}'
      brightness_level: '{{ ''low'' if (states(''sensor.brightness_curve_position'') | float(0.0)) >= 1.0 else (''mid'' if (states(''sensor.brightness_curve_position'') | float(0.0)) >= 0.5 else ''high'') }}'
      brightness:
        morning:
          high: 25
          mid: 25
          low: 25
        day:
          high: 95
          mid: 45
          low: 25
        sunset:
          high: 75
          mid: 50
          low: 25
        night:
          high: 75
          mid: 50
          low: 25
      ht_playing_brightness: 13
      is_sunset: '{{ mode_key == ''sunset'' }}'
      effective_mode: '{{ ''night'' if is_sunset else mode_key }}'
      is_ht_playing: '{{ ht_state == ''playing'' }}'
      level: '{{ brightness_level }}'
      sleep_recently_ended: "{{ is_state('input_boolean.mode_sleep', 'off') and\n
        \  (as_timestamp(now()) - as_timestamp(states.input_boolean.mode_sleep.last_changed))
        < 300 }}"
      target_brightness: "{% if is_ht_playing %}\n  {{ ht_playing_brightness }}\n{%
        elif effective_mode == 'day' and level == 'mid' and sleep_recently_ended %}\n
        \ 25\n{% else %}\n  {{ brightness[effective_mode][level] | default(brightness.night[level]
        | default(25)) }}\n{% endif %}"
  - action: light.turn_on
    target:
      entity_id: light.upstairs_hallway_group
    data:
      brightness: '{{ target_brightness | int }}'
      transition: 2
lighting_den:
  alias: Lighting - Den
  icon: mdi:lightbulb
  mode: restart
  sequence:
  - variables:
      mode_key: '{{ states(''sensor.dashboard_current_home_mode'') | lower }}'
      is_day: '{{ mode_key == ''day'' }}'
  - choose:
    - conditions:
      - '{{ is_day }}'
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.den
    default:
    - action: light.turn_on
      target:
        entity_id: light.den
      data:
        brightness: 75
        color_temp_kelvin: 3500
        transition: 2
    - delay:
        seconds: 2
    - action: input_select.select_option
      target:
        entity_id: input_select.den_scene_toggle
      data:
        option: script.lighting_den
