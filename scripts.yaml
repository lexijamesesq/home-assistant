lighting_patio:
  alias: Lighting - Patio
  icon: mdi:lightbulb
  mode: restart
  sequence:
  - variables:
      mode_key: '{{ states(''input_select.time_of_day_mode'') | lower }}'
      is_sleep: '{{ is_state(''input_boolean.mode_sleep'', ''on'') }}'
      is_day: '{{ mode_key in [''day'', ''morning''] }}'
      holiday: '{{ is_state(''calendar.holiday_lighting'', ''on'') }}'
      holiday_name: '{{ state_attr(''calendar.holiday_lighting'', ''message'') if
        holiday else '''' }}'
  - choose:
    - conditions:
      - '{{ is_sleep }}'
      sequence:
      - condition: state
        entity_id: light.patio
        state: 'on'
      - action: light.turn_off
        target:
          entity_id: light.patio
    - conditions:
      - '{{ is_day }}'
      sequence: []
    - conditions:
      - '{{ holiday and holiday_name == ''Christmas'' }}'
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.patio
    default:
    - parallel:
      - action: light.turn_on
        target:
          entity_id: light.downstairs_patio
        data:
          brightness: 50
          color_temp_kelvin: 2500
          transition: 2
      - action: light.turn_on
        target:
          entity_id: light.upstairs_patio
        data:
          brightness: 152
          color_temp_kelvin: 2500
          transition: 2
lighting_patio_string_lights:
  alias: Lighting - Patio String Lights
  icon: mdi:lightbulb
  mode: restart
  sequence:
  - variables:
      mode_key: '{{ states(''input_select.time_of_day_mode'') | lower }}'
      is_sleep: '{{ is_state(''input_boolean.mode_sleep'', ''on'') }}'
      is_day: '{{ mode_key in [''day'', ''morning''] }}'
      holiday: '{{ is_state(''calendar.holiday_lighting'', ''on'') }}'
      holiday_name: '{{ state_attr(''calendar.holiday_lighting'', ''message'') | lower
        if holiday else '''' }}'
      holiday_script: '{{ ''script.holiday_'' ~ holiday_name if holiday else ''''
        }}'
  - choose:
    - conditions:
      - '{{ is_sleep }}'
      sequence:
      - action: light.turn_off
        target:
          entity_id:
          - light.downstairs_patio_string
          - light.upstairs_patio_string
    - conditions:
      - '{{ is_day }}'
      sequence:
      - action: light.turn_off
        target:
          entity_id:
          - light.downstairs_patio_string
          - light.upstairs_patio_string
    - conditions:
      - '{{ holiday and has_value(holiday_script) }}'
      sequence:
      - action: script.turn_on
        target:
          entity_id: '{{ holiday_script }}'
    default:
    - parallel:
      - action: light.turn_on
        target:
          entity_id: light.downstairs_patio_string
        data:
          brightness: 154
          color_temp_kelvin: 2500
          transition: 2
      - action: light.turn_on
        target:
          entity_id: light.upstairs_patio_string
        data:
          brightness: 154
          color_temp_kelvin: 2500
          transition: 2
lighting_studio:
  alias: Lighting - Studio
  icon: mdi:lightbulb
  mode: restart
  sequence:
  - variables:
      mode_key: '{{ states(''input_select.time_of_day_mode'') | lower }}'
      is_day: '{{ mode_key == ''day'' }}'
  - if:
    - '{{ is_day }}'
    then: []
    else:
    - action: light.turn_on
      target:
        entity_id: light.studio
      data:
        brightness: 75
        color_temp_kelvin: 3500
        transition: 2
