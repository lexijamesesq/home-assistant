lighting_patio:
  alias: Lighting - Patio
  icon: mdi:lightbulb
  mode: restart
  sequence:
  - variables:
      mode_key: '{{ states(''sensor.dashboard_current_home_mode'') | lower }}'
      is_day: '{{ mode_key in [''day'', ''morning''] }}'
      holiday: '{{ is_state(''calendar.holiday_lighting'', ''on'') }}'
      holiday_name: '{{ state_attr(''calendar.holiday_lighting'', ''message'') if
        holiday else '''' }}'
  - choose:
    - conditions:
      - '{{ is_day }}'
      sequence: []
    - conditions:
      - '{{ holiday and holiday_name == ''Christmas'' }}'
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.patio
    default:
    - parallel:
      - action: light.turn_on
        target:
          entity_id: light.downstairs_patio
        data:
          brightness: 50
          color_temp_kelvin: 2500
          transition: 2
      - action: light.turn_on
        target:
          entity_id: light.upstairs_patio
        data:
          brightness: 152
          color_temp_kelvin: 2500
          transition: 2
lighting_patio_string_lights:
  alias: Lighting - Patio String Lights
  icon: mdi:lightbulb
  mode: restart
  sequence:
  - variables:
      mode_key: '{{ states(''input_select.time_of_day_mode'') | lower }}'
      is_day: '{{ mode_key in [''day'', ''morning''] }}'
      holiday: '{{ is_state(''calendar.holiday_lighting'', ''on'') }}'
      holiday_name: '{{ state_attr(''calendar.holiday_lighting'', ''message'') | lower if holiday else '''' }}'
      holiday_scene: '{{ ''scene.holiday_'' ~ holiday_name if holiday else '''' }}'
  - choose:
    - conditions:
      - '{{ is_day }}'
      sequence:
      - action: light.turn_off
        target:
          entity_id:
          - light.downstairs_patio_string
          - light.upstairs_patio_string
    - conditions:
      - '{{ holiday and has_value(holiday_scene) }}'
      sequence:
      - action: scene.turn_on
        target:
          entity_id: '{{ holiday_scene }}'
    default:
    - parallel:
      - action: light.turn_on
        target:
          entity_id: light.downstairs_patio_string
        data:
          brightness: 154
          color_temp_kelvin: 2500
          transition: 2
      - action: light.turn_on
        target:
          entity_id: light.upstairs_patio_string
        data:
          brightness: 154
          color_temp_kelvin: 2500
          transition: 2
lighting_studio:
  alias: Lighting - Studio
  icon: mdi:lightbulb
  mode: restart
  sequence:
  - variables:
      mode_key: '{{ states(''sensor.dashboard_current_home_mode'') | lower }}'
      is_day: '{{ mode_key == ''day'' }}'
  - if:
    - '{{ is_day }}'
    then: []
    else:
    - action: light.turn_on
      target:
        entity_id: light.studio
      data:
        brightness: 75
        color_temp_kelvin: 3500
        transition: 2
lighting_bedroom_mood:
  alias: Lighting - Bedroom Mood
  icon: mdi:lightbulb-multiple
  mode: restart
  sequence:
  - parallel:
    - action: light.turn_on
      target:
        entity_id: light.bedroom_1
      data:
        transition: 2
        brightness: 100
        rgb_color:
        - 65
        - 102
        - 255
    - action: light.turn_on
      target:
        entity_id: light.bedroom_2
      data:
        transition: 2
        brightness: 100
        rgb_color:
        - 15
        - 163
        - 255
    - action: light.turn_on
      target:
        entity_id: light.bedroom_switch
      data:
        brightness: 75
lighting_den_mood:
  alias: Lighting - Den Mood
  icon: mdi:lightbulb-multiple
