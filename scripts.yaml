update_lights:
  alias: Update Lights
  icon: mdi:lightbulb-on
  mode: parallel
  sequence:
  - condition: template
    value_template: '{{ lights is defined }}'
  - variables:
      new_model_rooms:
      - kitchen
      - living_room
      - rec_room_canvas
      - downstairs_hallway
      - upstairs_hallway_group
      - den
      - den_cabinets
      - den_hallway
      - garage_stairs
      - bedroom
      - living_room_tv
      - patio
      - patio_string_lights
      - studio
      current_mode: "{{ states('sensor.dashboard_current_home_mode') }}"
      ht_state: "{{ 'playing' if is_state('input_boolean.mode_home_theater', 'on') and is_state('media_player.living_room_apple_tv', 'playing') else ('on' if is_state('input_boolean.mode_home_theater', 'on') else 'none') }}"
      current_brightness: "{% set time = now().strftime('%H:%M:%S') %}{% set low = states('input_datetime.prefer_lighting_low_time') %}{% set mid = states('input_datetime.prefer_lighting_mid_time') %}{% set high = states('input_datetime.prefer_lighting_high_time') %}{% if time >= low or time < high %}low{% elif time >= mid %}mid{% else %}{{ 'mid' if trigger is defined else 'high' }}{% endif %}"
      legacy_lights: "{{ lights | reject('in', new_model_rooms) | list }}"
      new_lights: "{{ lights | select('in', new_model_rooms) | list }}"
      ht_lights:
      - kitchen
      - living_room
      - living_room_tv
      - rec_room_canvas
      ambient_lights:
      - living_room_tv
      - rec_room_canvas
      - den_cabinets
      - patio_string_lights
  - if:
    - "{{ legacy_lights | length > 0 }}"
    then:
    - service: script.turn_on
      data:
        entity_id: >-
          {% set mode = '_' + current_mode | lower %}
          {% set ht = '_ht_playing' if ht_state == 'playing' else ('_ht_on' if ht_state == 'on' else '') %}
          {% set brightness = '_' + current_brightness %}
          {% for light in legacy_lights -%}
            script.scene_{{ light }}{{ mode }}{{ ht if light in ht_lights }}{{ brightness if light not in ambient_lights }}
            {%- if not loop.last -%},{%- endif %}
          {%- endfor %}
  - if:
    - "{{ new_lights | length > 0 }}"
    then:
    - repeat:
        for_each: "{{ new_lights }}"
        sequence:
        - action: script.turn_on
          target:
            entity_id: "script.lighting_{{ repeat.item }}"
          data:
            variables:
              mode: "{{ current_mode }}"
              brightness_level: "{{ current_brightness }}"
              ht_state: "{{ ht_state }}"
