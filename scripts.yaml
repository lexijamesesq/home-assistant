        {{ is_state('input_boolean.mode_sleep', 'off') and
           (as_timestamp(now()) - as_timestamp(states.input_boolean.mode_sleep.last_changed)) < 300 }}
      target_brightness: >-
        {% if is_ht_playing %}
          {{ ht_playing_brightness }}
        {% elif effective_mode == 'day' and level == 'mid' and sleep_recently_ended %}
          25
        {% else %}
          {{ brightness[effective_mode][level] | default(brightness.night[level] | default(25)) }}
        {% endif %}
  - action: light.turn_on
