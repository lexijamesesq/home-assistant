        if is_state(''input_boolean.mode_home_theater'', ''on'') else ''none'') }}'
      is_sleep: '{{ is_state(''input_boolean.mode_sleep'', ''on'') }}'
      brightness_level: '{{ ''low'' if (states(''sensor.brightness_curve_position'')
        | float(0.0)) >= 1.0 else (''mid'' if (states(''sensor.brightness_curve_position'')
        | float(0.0)) >= 0.5 else ''high'') }}'
      brightness:
        morning:
          high: 25
          mid: 25
          low: 25
        day:
          high: 95
          mid: 45
          low: 25
        sunset:
          high: 75
          mid: 50
          low: 25
        night:
          high: 75
          mid: 50
          low: 25
      ht_playing_brightness: 13
      is_sunset: '{{ mode_key == ''sunset'' }}'
      effective_mode: '{{ ''night'' if is_sunset else mode_key }}'
      is_ht_playing: '{{ ht_state == ''playing'' }}'
      level: '{{ brightness_level }}'
      sleep_recently_ended: '{{ is_state(''input_boolean.mode_sleep'', ''off'') and
        (as_timestamp(now()) - as_timestamp(states.input_boolean.mode_sleep.last_changed))
        < 300 }}'
      target_brightness: '{% if is_sleep %}10{% elif is_ht_playing %}{{ ht_playing_brightness
        }}{% elif effective_mode == ''day'' and level == ''mid'' and sleep_recently_ended
        %}25{% else %}{{ brightness[effective_mode][level] | default(brightness.night[level]
        | default(25)) }}{% endif %}'
  - action: light.turn_on
    target:
      entity_id: light.upstairs_hallway_group
    data:
      brightness: '{{ target_brightness | int }}'
      transition: 2
