nest_toggle_downstairs_eco:
  alias: Nest Toggle Downstairs Eco
  sequence:
  - service: climate.set_preset_mode
    target:
      entity_id: climate.downstairs
    data:
      preset_mode: '{{ ''eco'' if is_state_attr(''climate.downstairs'', ''preset_mode'',
        ''none'') else ''none'' }}'
nest_toggle_upstairs_eco:
  alias: Nest Toggle Upstairs Eco
  sequence:
  - service: climate.set_preset_mode
    target:
      entity_id: climate.upstairs
    data:
      preset_mode: '{{ ''eco'' if is_state_attr(''climate.upstairs'', ''preset_mode'',
        ''none'') else ''none'' }}'
simulate_presence:
  alias: Simulate Presence
  sequence:
    repeat:
      while:
      - condition: state
        entity_id: input_boolean.mode_simulate_presence
        state: 'on'
      sequence:
      - service: script.turn_on
        data:
          entity_id: '{{ states.group.simulate_presence_scenes.attributes.entity_id
            | random }}'
      - delay: 00:{{ (range(35, 55) | random) }}:00
      - service: light.turn_off
        entity_id: group.inside_lights
      - delay: 00:{{ (range(2, 10) | random) }}:00
